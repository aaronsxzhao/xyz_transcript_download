name: Rescue Oracle Container

on:
  workflow_dispatch:

env:
  OCIR_REGISTRY: iad.ocir.io
  OCIR_NAMESPACE: ide2oawxnq9y
  OCIR_REPO: podcast-tool
  OCI_REGION: us-ashburn-1
  CONTAINER_INSTANCE_ID: ocid1.computecontainerinstance.oc1.iad.anuwcljrram2hqqaueqbs2y4opn3tm2jfpmx4a7gdsscygwyjgnac5vrqgta
  COMPARTMENT_ID: ocid1.compartment.oc1..aaaaaaaaorvzawio5acl4awquwshitqthiu7yp3k7muym47wv632talxpuoa
  SUBNET_ID: ocid1.subnet.oc1.iad.aaaaaaaahxx7dhu37m5enxzaolx6lxir6iz4pp3sp3o75dcxcy5gw5nyh5fa

jobs:
  rescue:
    name: Rescue Container Instance
    runs-on: ubuntu-latest

    steps:
      - name: Install and configure OCI CLI
        env:
          OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_CLI_REGION: ${{ env.OCI_REGION }}
        run: |
          pip install oci-cli
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=~/.oci/key.pem\n' \
            "${OCI_CLI_USER}" "${OCI_CLI_FINGERPRINT}" "${OCI_CLI_TENANCY}" "${OCI_CLI_REGION}" \
            > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Get current container instance config
        id: get-config
        run: |
          echo "=== Current Container Instance State ==="
          oci container-instances container-instance get \
            --container-instance-id ${{ env.CONTAINER_INSTANCE_ID }} \
            --query 'data."lifecycle-state"' --raw-output 2>/dev/null || echo "UNKNOWN"

          echo ""
          echo "=== Exporting full config ==="
          oci container-instances container-instance get \
            --container-instance-id ${{ env.CONTAINER_INSTANCE_ID }} \
            > /tmp/old-instance.json 2>&1 || true
          cat /tmp/old-instance.json | python3 -m json.tool 2>/dev/null | head -100 || echo "Could not parse config"

          # Extract key fields for recreation
          python3 << 'PYEOF'
          import json, os

          try:
              with open("/tmp/old-instance.json") as f:
                  data = json.load(f)["data"]

              # Extract availability domain
              ad = data.get("availability-domain", "")
              shape = data.get("shape", "CI.Standard.A1.Flex")
              shape_config = data.get("shape-config", {})
              ocpus = shape_config.get("ocpus", 1)
              memory = shape_config.get("memory-in-gbs", 6)
              display_name = data.get("display-name", "podcast-tool")

              # Extract container config
              containers = data.get("containers", [])
              if containers:
                  c = containers[0]
                  env_vars = c.get("environment-variables", {})
                  image = c.get("image-url", "")

              # Extract vnics
              vnics = data.get("vnics", [])
              subnet_id = vnics[0].get("subnet-id", "") if vnics else ""

              print(f"AD: {ad}")
              print(f"Shape: {shape}")
              print(f"OCPUs: {ocpus}")
              print(f"Memory: {memory} GB")
              print(f"Display name: {display_name}")
              print(f"Image: {image}")
              print(f"Subnet: {subnet_id}")
              print(f"Env vars: {len(env_vars)} variables")
              for k in env_vars:
                  print(f"  {k}={'***' if 'key' in k.lower() or 'secret' in k.lower() or 'password' in k.lower() else env_vars[k][:30]}")

              # Save for next step
              config = {
                  "ad": ad,
                  "shape": shape,
                  "ocpus": ocpus,
                  "memory": memory,
                  "display_name": display_name,
                  "image": image,
                  "subnet_id": subnet_id,
                  "env_vars": env_vars,
              }
              with open("/tmp/extracted-config.json", "w") as f:
                  json.dump(config, f)
              print("\nConfig extracted successfully!")
          except Exception as e:
              print(f"Error extracting config: {e}")
              exit(1)
          PYEOF

      - name: Delete stuck container instance
        run: |
          echo "Deleting stuck container instance..."
          oci container-instances container-instance delete \
            --container-instance-id ${{ env.CONTAINER_INSTANCE_ID }} \
            --force 2>&1 || echo "Delete command sent"

          echo "Waiting for deletion..."
          for i in $(seq 1 30); do
            STATE=$(oci container-instances container-instance get \
              --container-instance-id ${{ env.CONTAINER_INSTANCE_ID }} \
              --query 'data."lifecycle-state"' --raw-output 2>&1)
            echo "  Check $i: $STATE"
            if echo "$STATE" | grep -qiE "DELETED|404|not found|ServiceError"; then
              echo "Container instance deleted!"
              break
            fi
            sleep 10
          done

      - name: Recreate container instance
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys

          with open("/tmp/extracted-config.json") as f:
              config = json.load(f)

          image_url = "${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/${{ env.OCIR_REPO }}:latest"

          create_body = {
              "compartmentId": "${{ env.COMPARTMENT_ID }}",
              "availabilityDomain": config["ad"],
              "displayName": config["display_name"],
              "shape": config["shape"],
              "shapeConfig": {
                  "ocpus": config["ocpus"],
                  "memoryInGBs": config["memory"]
              },
              "containers": [{
                  "displayName": "app",
                  "imageUrl": image_url,
                  "environmentVariables": config["env_vars"],
              }],
              "vnics": [{
                  "subnetId": config["subnet_id"],
                  "isPublicIpAssigned": True
              }],
              "imagePullSecrets": [{
                  "registryEndpoint": "${{ env.OCIR_REGISTRY }}",
                  "secretType": "BASIC",
                  "username": "${{ env.OCIR_NAMESPACE }}/vincentjyzhao@gmail.com",
                  "password": "${{ secrets.OCIR_AUTH_TOKEN }}"
              }],
              "gracefulShutdownTimeoutInSeconds": 30,
          }

          with open("/tmp/create-body.json", "w") as f:
              json.dump(create_body, f, indent=2)

          print("Create body:")
          # Print sanitized version
          safe = json.loads(json.dumps(create_body))
          for s in safe.get("imagePullSecrets", []):
              s["password"] = "***"
          env = safe["containers"][0].get("environmentVariables", {})
          for k in env:
              if any(x in k.lower() for x in ["key", "secret", "password", "token"]):
                  env[k] = "***"
          print(json.dumps(safe, indent=2))
          PYEOF

          echo ""
          echo "Creating new container instance..."
          RESULT=$(oci container-instances container-instance create \
            --from-json "file:///tmp/create-body.json" 2>&1)
          echo "$RESULT"

          # Extract new instance ID
          NEW_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['id'])" 2>/dev/null || echo "")
          if [ -n "$NEW_ID" ]; then
            echo ""
            echo "=========================================="
            echo "NEW CONTAINER INSTANCE ID:"
            echo "$NEW_ID"
            echo "=========================================="
            echo ""
            echo "IMPORTANT: Update CONTAINER_INSTANCE_ID in"
            echo ".github/workflows/deploy-oracle.yml with this new ID!"

            # Wait for it to become active
            echo ""
            echo "Waiting for new instance to become ACTIVE..."
            for i in $(seq 1 30); do
              STATE=$(oci container-instances container-instance get \
                --container-instance-id "$NEW_ID" \
                --query 'data."lifecycle-state"' --raw-output 2>&1)
              echo "  Check $i: $STATE"
              if [ "$STATE" = "ACTIVE" ]; then
                echo "New container is ACTIVE!"
                break
              fi
              sleep 10
            done
          else
            echo "ERROR: Could not extract new instance ID"
            echo "Full result: $RESULT"
          fi

      - name: Verify health
        run: |
          echo "Waiting for app to start..."
          sleep 30
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://aipodcastsummary.online/api/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "App is healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "WARNING: Health check not passing. The new container may need DNS/IP to propagate."
          echo "Check the Oracle Cloud Console for the new public IP and update Cloudflare DNS if needed."
